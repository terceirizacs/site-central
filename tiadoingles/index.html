.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px;flex-wrap:wrap;gap:12px}
.header-left{display:flex;align-items:center;gap:16px}
.hdr-logo{width:48px;height:48px;border-radius:16px;object-fit:cover;flex-shrink:0}
@media(min-width:768px){.hdr-logo{width:56px;height:56px}}
.header h1{font-size:22px;font-weight:800;letter-spacing:-.5px}
@media(min-width:768px){.header h1{font-size:28px}}
.header .sub{font-size:13px;color:var(--t2);margin-top:2px}
.header-right{display:flex;align-items:center;gap:8px}
.badge{font-size:12px;color:var(--t2);font-family:'JetBrains Mono';background:var(--card);border:1px solid var(--border);padding:6px 12px;border-radius:10px;display:none}
@media(min-width:768px){.badge{display:block}}
.theme-toggle{display:flex;gap:4px;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:3px}
.theme-btn{padding:5px 10px;border-radius:7px;border:none;background:transparent;color:var(--t3);font-size:14px;cursor:pointer;transition:all .2s}
.theme-btn.active{background:var(--accent);color:#fff}
nav{display:flex;gap:6px;margin-bottom:24px;flex-wrap:wrap;overflow-x:auto;-webkit-overflow-scrolling:touch}
.tab-btn{padding:10px 18px;border-radius:14px;border:1px solid var(--border);background:var(--card);color:var(--t2);font-size:13px;font-weight:600;cursor:pointer;transition:all .3s;white-space:nowrap;flex-shrink:0}
@media(min-width:768px){.tab-btn{padding:12px 24px;font-size:14px}}
.tab-btn:hover{border-color:var(--bh);color:var(--t1)}
.tab-btn.active{background:linear-gradient(135deg,var(--accent),var(--a2));color:#fff;border-color:transparent}
.tab-content{display:none}.tab-content.active{display:block}
.filter-bar{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:20px;margin-bottom:28px}
@media(min-width:768px){.filter-bar{padding:28px;border-radius:24px}}
.filter-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:8px}
.filter-title{font-size:15px;font-weight:700}
.filter-actions{display:flex;gap:8px}
.filter-clear{padding:7px 14px;border-radius:10px;border:1px solid var(--border);background:transparent;color:var(--t2);font-size:12px;font-weight:600;cursor:pointer}
.filter-clear:hover{border-color:var(--red);color:var(--red)}
.filter-apply{padding:7px 14px;border-radius:10px;border:none;background:var(--accent);color:#fff;font-size:12px;font-weight:700;cursor:pointer}
.filter-grid{display:grid;grid-template-columns:1fr;gap:12px}
@media(min-width:600px){.filter-grid{grid-template-columns:repeat(2,1fr)}}
@media(min-width:900px){.filter-grid{grid-template-columns:repeat(3,1fr)}}
.filter-group{display:flex;flex-direction:column;gap:5px}
.filter-label{font-size:11px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:1px}
.ms-wrap{position:relative}
.ms-trigger{padding:9px 12px;border-radius:9px;border:1px solid var(--border);background:var(--track-bg);color:var(--t2);font-size:13px;cursor:pointer;user-select:none;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ms-trigger:hover,.ms-trigger.open{border-color:var(--accent);color:var(--t1)}
.ms-count{background:var(--accent);color:#fff;font-size:11px;padding:1px 7px;border-radius:7px;margin-left:4px;font-weight:700}
.ms-dropdown{position:absolute;top:100%;left:0;right:0;background:#1e293b;border:1px solid var(--border);border-radius:12px;max-height:240px;overflow-y:auto;z-index:50;display:none;box-shadow:0 12px 40px rgba(0,0,0,.4)}
[data-theme="light"] .ms-dropdown{background:#fff}
.ms-dropdown.show{display:block}
.ms-selall{padding:9px 12px;font-size:13px;color:var(--accent);cursor:pointer;border-bottom:1px solid var(--border);font-weight:600}
.ms-option{padding:7px 12px;font-size:13px;color:var(--t2);cursor:pointer;display:flex;align-items:center;gap:7px}
.ms-option:hover{background:rgba(139,124,247,.08);color:var(--t1)}
.ms-option.selected{background:rgba(139,124,247,.12);color:var(--accent)}
.ms-check{width:15px;height:15px;border-radius:4px;border:2px solid var(--border);flex-shrink:0}
.ms-option.selected .ms-check{background:var(--accent);border-color:var(--accent)}
.active-filters{display:flex;gap:6px;flex-wrap:wrap;margin-top:14px;align-items:center}
.filter-tag{padding:5px 12px;border-radius:9px;font-size:12px;font-weight:500;background:rgba(139,124,247,.1);border:1px solid rgba(139,124,247,.2);color:var(--accent);display:flex;align-items:center;gap:6px}
.filter-tag.neutral{background:rgba(255,255,255,.03);border-color:var(--border);color:var(--t3)}
.results-badge{background:rgba(45,212,191,.08);border:1px solid rgba(45,212,191,.2);color:var(--teal);font-size:12px;font-family:'JetBrains Mono';padding:6px 14px;border-radius:9px;margin-left:auto}
.sec{font-size:14px;text-transform:uppercase;letter-spacing:2px;color:var(--t3);font-weight:600;margin:36px 0 18px;display:flex;align-items:center;gap:10px}
.sec::after{content:'';flex:1;height:1px;background:var(--border)}
.kpis{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;margin:24px 0;border-top:1px solid var(--border);padding-top:24px}
@media(min-width:900px){.kpis{grid-template-columns:repeat(5,1fr);gap:20px}}
.kpi{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:24px 20px;transition:all .3s}
@media(min-width:768px){.kpi{padding:32px 28px;border-radius:24px}}
.kpi:hover{transform:translateY(-2px);border-color:var(--bh);box-shadow:0 12px 36px var(--shadow)}
.kpi-bar{height:3px;border-radius:2px;margin-bottom:18px}
.kpi-l{font-size:12px;color:var(--t2);text-transform:uppercase;letter-spacing:1px;font-weight:500;margin-bottom:10px}
@media(min-width:768px){.kpi-l{font-size:13px}}
.kpi-v{font-size:28px;font-weight:700;font-family:'JetBrains Mono';line-height:1;letter-spacing:-1px}
@media(min-width:768px){.kpi-v{font-size:42px;letter-spacing:-2px}}
.kpi-s{font-size:12px;color:var(--t3);margin-top:8px;font-family:'JetBrains Mono'}
.g2{display:grid;grid-template-columns:1fr;gap:20px}
@media(min-width:900px){.g2{grid-template-columns:1fr 1fr}}
.card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:24px;transition:all .3s}
@media(min-width:768px){.card{padding:32px;border-radius:24px}}
.card:hover{border-color:var(--bh);box-shadow:0 12px 40px var(--shadow)}
.card h3{font-size:18px;font-weight:700;margin-bottom:4px;letter-spacing:-.3px}
@media(min-width:768px){.card h3{font-size:20px}}
.card .d{font-size:13px;color:var(--t3);margin-bottom:20px}
.hbar-area{background:var(--chart-bg);border-radius:14px;padding:20px;display:flex;flex-direction:column;justify-content:center;gap:14px}
@media(min-width:768px){.hbar-area{padding:28px;gap:20px}}
.hbar-row{display:flex;align-items:center;gap:8px}
@media(min-width:768px){.hbar-row{gap:12px}}
.hbar-lbl{font-size:12px;color:var(--t2);min-width:100px;text-align:right;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
@media(min-width:768px){.hbar-lbl{font-size:14px;min-width:140px}}
.hbar-track{flex:1;height:32px;background:var(--track-bg);border-radius:10px;overflow:visible;position:relative}
@media(min-width:768px){.hbar-track{height:38px}}
.hbar-fill{height:100%;border-radius:10px;display:flex;align-items:center;padding-left:10px;font-family:'JetBrains Mono';font-weight:600;font-size:12px;color:var(--t1);transition:width .6s;white-space:nowrap;overflow:visible}
@media(min-width:768px){.hbar-fill{font-size:14px;padding-left:14px}}
.hbar-pct{font-family:'JetBrains Mono';font-size:12px;font-weight:600;color:var(--t2);margin-left:6px;flex-shrink:0}
.ft-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--track-bg);flex-wrap:wrap}
@media(min-width:768px){.ft-row{gap:14px;padding:14px 0;flex-wrap:nowrap}}
.ft-row:last-child{border:none}
.ft-tag{padding:5px 12px;border-radius:12px;font-size:12px;font-weight:600;font-family:'JetBrains Mono';min-width:0;flex-shrink:0}
@media(min-width:768px){.ft-tag{min-width:180px;font-size:13px}}
.ft-qty{font-family:'JetBrains Mono';font-weight:700;font-size:14px;min-width:50px;text-align:right}
.ft-pct{font-family:'JetBrains Mono';font-size:13px;color:var(--t2);min-width:60px;text-align:right}
.ft-track{flex:1;height:7px;background:var(--track-fill);border-radius:4px;overflow:hidden;min-width:60px}
.ft-fill{height:100%;border-radius:4px}
.prog-area{height:280px;background:var(--chart-bg);border-radius:14px;display:flex;flex-direction:column;overflow:visible}
@media(min-width:768px){.prog-area{height:340px}}
.prog-bars{flex:1;display:flex;align-items:flex-end;gap:5px;padding:24px 10px 0}
@media(min-width:768px){.prog-bars{gap:8px;padding:24px 16px 0}}
.prog-labels{display:flex;gap:5px;padding:6px 10px 10px}
@media(min-width:768px){.prog-labels{gap:8px;padding:8px 16px 12px}}
.prog-lbl{flex:1;text-align:center;font-size:9px;color:var(--t3);font-family:'JetBrains Mono'}
@media(min-width:768px){.prog-lbl{font-size:10px}}
.prog-bar{flex:1;border-radius:5px 5px 0 0;position:relative;transition:all .3s;cursor:default}
.prog-pct{position:absolute;top:-18px;left:50%;transform:translateX(-50%);font-size:10px;font-family:'JetBrains Mono';font-weight:600;color:var(--t1);white-space:nowrap}
.ins-g{display:grid;grid-template-columns:1fr;gap:12px}
@media(min-width:768px){.ins-g{grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px}}
.ins{padding:16px 20px;border-radius:14px;border:1px solid}
.ins.ok{background:rgba(52,211,153,.06);border-color:rgba(52,211,153,.2)}
.ins.w{background:rgba(248,113,113,.06);border-color:rgba(248,113,113,.2)}
.ins.i{background:rgba(139,124,247,.06);border-color:rgba(139,124,247,.2)}
.ins-t{font-size:14px;font-weight:700;margin-bottom:4px}
.ins-p{font-size:12px;color:var(--t2)}
.donut-area{min-height:280px;background:var(--chart-bg);border-radius:14px;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px;padding:20px;cursor:default}
@media(min-width:768px){.donut-area{min-height:340px;gap:20px}}
.donut-ring{width:150px;height:150px;border-radius:50%;display:flex;align-items:center;justify-content:center;position:relative}
@media(min-width:768px){.donut-ring{width:180px;height:180px}}
.donut-center{text-align:center}
.donut-v{font-size:18px;font-weight:700;font-family:'JetBrains Mono';letter-spacing:-1px;line-height:1.1}
@media(min-width:768px){.donut-v{font-size:20px}}
.donut-lbl{font-size:12px;color:var(--t3)}
.donut-legend{display:flex;gap:10px;font-size:12px;color:var(--t2);flex-wrap:wrap;justify-content:center}
.donut-legend span{display:flex;align-items:center;gap:5px}
.donut-legend i{width:9px;height:9px;border-radius:50%;display:inline-block}
.footer{text-align:center;padding:32px 0 16px;color:var(--t3);font-size:12px;border-top:1px solid var(--border);margin-top:48px}
.det-table{width:100%;border-collapse:collapse;font-size:13px}
.det-table thead{position:sticky;top:0;z-index:2}
.det-table th{background:var(--card);padding:12px;text-align:left;border-bottom:2px solid var(--border);color:var(--accent);font-weight:700;cursor:pointer;white-space:nowrap;user-select:none}
.det-table th:hover{color:var(--t1);background:var(--track-bg)}
.det-table th .sort-icon{font-size:10px;margin-left:4px;color:var(--t3)}
.det-table td{padding:10px 12px;border-bottom:1px solid var(--border);color:var(--t2)}
.det-table tr:hover td{background:rgba(139,124,247,.04)}
.det-prog{display:inline-flex;align-items:center;gap:8px}
.det-prog-bar{width:80px;height:8px;background:var(--track-bg);border-radius:4px;overflow:hidden}
.det-prog-fill{height:100%;border-radius:4px;transition:width .3s}
.det-search{padding:10px 16px;border:1px solid var(--border);border-radius:12px;background:var(--card);color:var(--t1);font-size:14px;width:100%;max-width:400px;outline:none}
.det-search:focus{border-color:var(--accent)}
.det-status{padding:4px 10px;border-radius:8px;font-size:11px;font-weight:600}
.det-status.ativo{background:rgba(52,211,153,.12);color:var(--green)}
.det-status.inativo{background:rgba(248,113,113,.12);color:var(--red)}
.det-status.sem30{background:rgba(251,146,60,.12);color:var(--orange)}
.det-status.nunca{background:rgba(139,124,247,.12);color:var(--accent)}
.det-pager{display:flex;gap:8px;justify-content:center;margin-top:16px;flex-wrap:wrap}
.det-pager button{padding:6px 14px;border:1px solid var(--border);border-radius:8px;background:var(--card);color:var(--t2);font-size:13px;cursor:pointer}
.det-pager button.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.det-pager button:hover:not(.active){border-color:var(--accent);color:var(--t1)}
.chart-tooltip{position:fixed;background:rgba(15,23,42,.95);color:#f1f5f9;padding:12px 16px;border-radius:12px;font-size:13px;pointer-events:none;z-index:9999;box-shadow:0 12px 40px rgba(0,0,0,.5);border:1px solid rgba(139,124,247,.3);backdrop-filter:blur(10px);max-width:280px;line-height:1.5;opacity:0;transition:opacity .15s}
.chart-tooltip.show{opacity:1}
.chart-tooltip .tt-title{font-weight:700;font-size:14px;margin-bottom:4px;color:var(--accent)}
.chart-tooltip .tt-row{display:flex;justify-content:space-between;gap:12px}
.chart-tooltip .tt-label{color:#94a3b8}
.chart-tooltip .tt-value{font-weight:600;font-family:'JetBrains Mono';color:#f1f5f9}
#loginScreen{position:fixed;inset:0;background:var(--login-bg);z-index:9999;display:flex;align-items:center;justify-content:center}
#loginScreen.hidden{display:none}
.login-box{background:var(--card);border:1px solid var(--border);border-radius:24px;padding:56px 48px;text-align:center;max-width:420px;width:92%;box-shadow:0 24px 80px var(--shadow)}
.login-logo{width:80px;height:80px;border-radius:20px;object-fit:cover;margin:0 auto 20px;box-shadow:0 4px 16px rgba(0,0,0,.2)}
.login-box h2{font-size:24px;font-weight:700;margin-bottom:4px}
.login-box p{font-size:14px;color:var(--t2);margin-bottom:32px}
.login-input{width:100%;padding:16px 50px 16px 20px;background:var(--bg);border:1px solid var(--border);border-radius:14px;color:var(--t1);font-family:'Inter';font-size:15px;outline:none}
.login-input:focus{border-color:var(--accent)}
.login-btn{width:100%;padding:16px;background:var(--accent);border:none;border-radius:14px;color:#fff;font-family:'Inter';font-weight:600;font-size:15px;cursor:pointer;transition:all .2s;margin-top:16px}
.login-btn:hover{filter:brightness(1.1);transform:translateY(-1px)}
.login-error{color:var(--red);font-size:13px;margin-top:8px;display:none}
.loading-overlay{position:fixed;inset:0;background:var(--bg);z-index:9998;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:24px}
.loading-overlay.hidden{opacity:0;pointer-events:none}
.loading-spinner{width:48px;height:48px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-size:16px;color:var(--t2)}
.trilha-grid{display:grid;grid-template-columns:1fr;gap:16px}
@media(min-width:600px){.trilha-grid{grid-template-columns:repeat(2,1fr)}}
@media(min-width:1000px){.trilha-grid{grid-template-columns:repeat(3,1fr)}}
.trilha-card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:24px;transition:all .3s}
.trilha-card:hover{border-color:var(--bh);box-shadow:0 12px 40px var(--shadow)}
.trilha-name{font-size:14px;font-weight:700;margin-bottom:12px;color:var(--t1);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.trilha-media{font-size:32px;font-weight:700;font-family:'JetBrains Mono';letter-spacing:-1px;line-height:1}
.trilha-bar{height:6px;background:var(--track-bg);border-radius:4px;overflow:hidden;margin:12px 0}
.trilha-bar-fill{height:100%;border-radius:4px;transition:width .6s}
.trilha-stats{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}
.trilha-stat{padding:8px;background:var(--track-bg);border-radius:10px}
.trilha-stat-l{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.5px}
.trilha-stat-v{font-size:14px;font-weight:700;font-family:'JetBrains Mono';margin-top:2px}
.legend-box{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:18px 22px;margin:20px 0;display:flex;flex-wrap:wrap;gap:16px}
.lg-item{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--t2)}
.lg-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.cross-card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:28px;transition:all .3s}
.cross-card:hover{border-color:var(--bh);box-shadow:0 12px 40px var(--shadow)}
.cross-title{font-size:16px;font-weight:700;margin-bottom:6px}
.cross-desc{font-size:12px;color:var(--t3);margin-bottom:16px}
.cross-big{font-size:36px;font-weight:700;font-family:'JetBrains Mono';letter-spacing:-1px}
.cross-sub{font-size:12px;color:var(--t2);margin-top:4px}
.cross-bar{height:6px;background:var(--track-bg);border-radius:4px;overflow:hidden;margin-top:14px}
.cross-bar-fill{height:100%;border-radius:4px}
::-webkit-scrollbar{display:none}
*{scrollbar-width:none;-ms-overflow-style:none}
.pwd-wrap{position:relative;margin-bottom:16px}
.pwd-eye{position:absolute;right:16px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--t3);cursor:pointer;font-size:18px;padding:4px}
</style>

<script>
const SENHA='Tiadoingles123';
const API_URL='https://script.google.com/macros/s/AKfycbzON42XoYPO0KAQZhpeMm-UTMGlUwRVzNNRx1XhAjExnFTQ_EnOHnOAMXj9dyKOYyTZ/exec';

/* Product definitions */
const PRODUCTS=[
  {key:'mti',trailKey:'mtiTrilhas',label:'Metodo Tia do Ingles',short:'MTI'},
  {key:'mentoria',trailKey:'mentoriaTrilhas',label:'Mentoria Fluent Mind',short:'Mentoria'},
  {key:'decole',trailKey:'decoleTrilhas',label:'Decole com a Tia',short:'Decole'},
  {key:'protocolo',trailKey:'protocoloTrilhas',label:'Protocolo da Fluencia',short:'Protocolo'}
];

let RAW={}, ROWS=[], PESQ=[], NOW=Date.now();
let ALL_TRAILS_BY_PRODUCT={};

/* ===== LOGIN ===== */
function doLogin(){
  const v=document.getElementById('pwdInput').value;
  if(v===SENHA){
    document.getElementById('loginScreen').classList.add('hidden');
    const lo=document.getElementById('loadingOverlay');
    lo.classList.remove('hidden');lo.style.display='flex';
    loadData();
  }else{document.getElementById('pwdError').style.display='block';}
}

/* ===== DATA LOADING ===== */
async function loadData(){
  try{
    const r=await fetch(API_URL);
    const D=await r.json();
    if(D.error) throw new Error(D.error);
    RAW=D;
    PESQ=D.pesquisa||[];
    NOW=D.todayMs||Date.now();

    // Store trail names per product
    PRODUCTS.forEach(p=>{
      ALL_TRAILS_BY_PRODUCT[p.key]=D[p.trailKey]||[];
    });

    // Build MERGED dataset: unify all 5 products, dedup by email
    const emailMap=new Map();

    PRODUCTS.forEach(prod=>{
      const students=D[prod.key]||[];
      students.forEach(s=>{
        const em=(s.email||'').toLowerCase().trim();
        if(!em) return;
        let row=emailMap.get(em);
        if(!row){
          row={
            nome:s.nome,email:em,cpf:s.cpf||'',celular:s.celular||'',
            criadoEm:null,primAcesso:null,ultAcesso:null,
            tags:'',produtos:[],produtoLabels:[],
            trilhas:{},total:null,
            _sources:{}
          };
          emailMap.set(em,row);
        }
        row.produtos.push(prod.key);
        row.produtoLabels.push(prod.label);
        row._sources[prod.key]=s;

        // Merge dates: keep earliest criadoEm, latest ultAcesso/primAcesso
        if(s.criadoEm){
          if(!row.criadoEm||s.criadoEm<row.criadoEm) row.criadoEm=s.criadoEm;
        }
        if(s.primAcesso){
          if(!row.primAcesso||s.primAcesso>row.primAcesso) row.primAcesso=s.primAcesso;
        }
        if(s.ultAcesso){
          if(!row.ultAcesso||s.ultAcesso>row.ultAcesso) row.ultAcesso=s.ultAcesso;
        }
        // Merge tags
        if(s.tags){
          const existing=new Set(row.tags?row.tags.split(',').map(t=>t.trim()).filter(Boolean):[]);
          s.tags.split(',').map(t=>t.trim()).filter(Boolean).forEach(t=>existing.add(t));
          row.tags=[...existing].join(', ');
        }
        // Merge trilhas
        if(s.trilhas){
          for(const[trName,trVal] of Object.entries(s.trilhas)){
            if(typeof trVal==='number'){
              // Keep highest value per trail
              if(!row.trilhas[trName]||trVal>row.trilhas[trName]) row.trilhas[trName]=trVal;
            }
          }
        }
        // Total: average of all non-null totals
        if(typeof s.total==='number'){
          if(row.total===null) row.total=s.total;
          else row.total=(row.total+s.total)/2;
        }
      });
    });

    ROWS=[...emailMap.values()];

    initDate();
    buildFilters();
    renderAll();
    document.getElementById('loadingOverlay').style.display='none';
    document.getElementById('mainWrap').style.display='block';
  }catch(e){
    document.getElementById('loadingOverlay').innerHTML='<div style="color:var(--red);padding:40px;text-align:center;font-size:18px;max-width:500px"><div style="font-size:48px;margin-bottom:16px">!</div>Erro ao carregar dados:<br><br><span style="font-family:JetBrains Mono;font-size:14px">'+e.message+'</span><br><br><button onclick="loadData()" style="padding:12px 24px;background:var(--accent);color:#fff;border:none;border-radius:12px;font-size:14px;cursor:pointer;margin-top:8px">Tentar novamente</button></div>';
  }
}

/* ===== HELPERS ===== */
function initDate(){
  const d=new Date(NOW);
  const p=n=>String(n).padStart(2,'0');
  document.getElementById('dateBadge').textContent=p(d.getDate())+'/'+p(d.getMonth()+1)+'/'+d.getFullYear()+' '+p(d.getHours())+':'+p(d.getMinutes());
}
const fN=n=>n.toLocaleString('pt-BR');
const fP=n=>(n||0).toFixed(1).replace('.',',')+'%';
const avg=a=>a.length?a.reduce((s,v)=>s+v,0)/a.length:0;
function norm(s){return(s||'').normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase().trim();}
const DAY=86400000;
const shortName=n=>{if(!n)return '';return n.length>25?n.slice(0,23)+'...':n;};
const fmt=ts=>{if(!ts)return '-';const d=new Date(ts);return String(d.getDate()).padStart(2,'0')+'/'+String(d.getMonth()+1).padStart(2,'0')+'/'+d.getFullYear();};

// Tooltip
let _tip=null;
function initTip(){if(!_tip){_tip=document.createElement('div');_tip.className='chart-tooltip';document.body.appendChild(_tip);}}
function showTip(e,html){initTip();_tip.innerHTML=html;_tip.classList.add('show');const x=Math.min(e.clientX+14,window.innerWidth-300);const y=Math.max(e.clientY-60,8);_tip.style.left=x+'px';_tip.style.top=y+'px';}
function hideTip(){if(_tip)_tip.classList.remove('show');}

/* ===== STATUS LOGIC ===== */
// Ativo = comprou dentro do periodo de 1 ano (criadoEm + 365d > hoje)
// Inativo = comprou ha mais de 1 ano (criadoEm + 365d <= hoje)
// Sem acessar +30d = ultAcesso > 30 dias
// Nunca acessou = sem ultAcesso
function getExpiration(r){
  if(!r.criadoEm) return null;
  return r.criadoEm + 365*DAY;
}
function isAtivo(r){
  const exp=getExpiration(r);
  if(!exp) return false;
  return exp>NOW;
}
function isInativo(r){return !isAtivo(r);}
function semAcesso30(r){return r.ultAcesso&&(NOW-r.ultAcesso)>30*DAY;}
function nuncaAcessou(r){return !r.ultAcesso&&!r.primAcesso;}

function statusLabel(r){
  if(isAtivo(r)) return 'Ativo';
  return 'Inativo';
}
function statusClass(r){
  if(isAtivo(r)) return 'ativo';
  return 'inativo';
}

/* ===== THEME / TABS ===== */
function toggleTheme(){const h=document.documentElement,d=h.getAttribute('data-theme')==='dark';h.setAttribute('data-theme',d?'light':'dark');document.getElementById('btnDark').classList.toggle('active',!d);document.getElementById('btnLight').classList.toggle('active',d);}
function switchTab(t,b){document.querySelectorAll('.tab-btn').forEach(x=>x.classList.remove('active'));document.querySelectorAll('.tab-content').forEach(x=>x.classList.remove('active'));document.getElementById('tab-'+t).classList.add('active');b.classList.add('active');}

/* ===== MULTI-SELECT ===== */
function buildMS(id,vals){
  const w=document.getElementById(id);if(!w)return;
  let h='<div class="ms-trigger" onclick="toggleMS(this)">Todos</div><div class="ms-dropdown"><div class="ms-selall" onclick="toggleAll(this)">Marcar todos</div>';
  vals.forEach(v=>{h+='<div class="ms-option" onclick="toggleOpt(this)" data-val="'+String(v).replace(/"/g,'&quot;')+'"><div class="ms-check"></div>'+v+'</div>';});
  h+='</div>';w.innerHTML=h;
}
function toggleMS(t){const dd=t.nextElementSibling,o=dd.classList.contains('show');document.querySelectorAll('.ms-dropdown.show').forEach(d=>{d.classList.remove('show');d.previousElementSibling.classList.remove('open');});if(!o){dd.classList.add('show');t.classList.add('open');}}
function toggleOpt(o){o.classList.toggle('selected');updTrig(o.closest('.ms-wrap'));}
function toggleAll(e){const w=e.closest('.ms-wrap'),os=w.querySelectorAll('.ms-option'),all=w.querySelectorAll('.ms-option.selected').length===os.length;os.forEach(o=>{if(all)o.classList.remove('selected');else o.classList.add('selected');});updTrig(w);}
function updTrig(w){const t=w.querySelector('.ms-trigger'),s=w.querySelectorAll('.ms-option.selected');if(!s.length)t.innerHTML='Todos';else{const n=Array.from(s).map(o=>o.dataset.val);t.innerHTML=(n.length<=2?n.join(', '):n[0]+' +'+(n.length-1))+' <span class="ms-count">'+s.length+'</span>';}}
function getMS(id){const e=document.getElementById(id);if(!e)return[];return Array.from(e.querySelectorAll('.ms-option.selected')).map(o=>o.dataset.val);}
document.addEventListener('click',e=>{if(!e.target.closest('.ms-wrap'))document.querySelectorAll('.ms-dropdown.show').forEach(d=>{d.classList.remove('show');d.previousElementSibling.classList.remove('open');});});

/* ===== FILTERS ===== */
function buildFilters(){
  const prodLabels=PRODUCTS.map(p=>p.label);
  buildMS('fProduto',prodLabels);

  // Collect all tags
  const tagSet=new Set();
  ROWS.forEach(r=>{
    if(r.tags) r.tags.split(',').map(t=>t.trim()).filter(Boolean).forEach(t=>tagSet.add(t));
  });
  buildMS('fTags',[...tagSet].sort());
  buildMS('fStatus',['Ativo','Inativo']);
}

function getFiltered(){
  const fp=getMS('fProduto'),ft=getMS('fTags'),fs=getMS('fStatus');
  return ROWS.filter(r=>{
    if(fp.length){
      const ok=fp.some(label=>r.produtoLabels.includes(label));
      if(!ok) return false;
    }
    if(ft.length){
      const rTags=r.tags?r.tags.split(',').map(t=>t.trim()):[];
      const ok=ft.some(t=>rTags.includes(t));
      if(!ok) return false;
    }
    if(fs.length){
      const lbl=statusLabel(r);
      if(!fs.includes(lbl)) return false;
    }
    return true;
  });
}

function applyFilters(){
  const rows=getFiltered(),tags=[];
  getMS('fProduto').forEach(v=>tags.push(v.length>24?v.slice(0,22)+'...':v));
  getMS('fTags').forEach(v=>tags.push(v.length>24?v.slice(0,22)+'...':v));
  getMS('fStatus').forEach(v=>tags.push(v));
  const a=document.getElementById('tagsArea');
  a.innerHTML=tags.length
    ?tags.map(t=>'<div class="filter-tag">'+t+'</div>').join('')+'<span class="results-badge">'+fN(rows.length)+' alunos</span>'
    :'<div class="filter-tag neutral">Nenhum filtro ativo</div>';
  renderAll(rows);
}
function resetFilters(){
  document.querySelectorAll('.ms-option.selected').forEach(o=>o.classList.remove('selected'));
  document.querySelectorAll('.ms-trigger').forEach(t=>t.innerHTML='Todos');
  document.getElementById('tagsArea').innerHTML='<div class="filter-tag neutral">Nenhum filtro ativo</div>';
  renderAll();
}

/* ===== GET STUDENTS FOR A PRODUCT (from RAW, filtered by current filter) ===== */
function getProductStudents(prodKey,filteredRows){
  const filteredEmails=new Set(filteredRows.map(r=>r.email));
  return (RAW[prodKey]||[]).filter(s=>{
    const em=(s.email||'').toLowerCase().trim();
    return filteredEmails.has(em);
  });
}

/* ===== TRAIL STATS PER PRODUCT ===== */
function trailStatsForProduct(prodKey,filteredRows){
  const trails=ALL_TRAILS_BY_PRODUCT[prodKey]||[];
  const students=getProductStudents(prodKey,filteredRows);
  return trails.map(name=>{
    let soma=0,cnt=0,iniciados=0,zeros=0,alto=0,medio=0,baixo=0;
    students.forEach(s=>{
      cnt++;
      const v=s.trilhas?s.trilhas[name]:null;
      const val=typeof v==='number'?v:0;
      soma+=val;
      if(val>0){
        iniciados++;
        if(val>=50)alto++;else if(val>=10)medio++;else baixo++;
      }else zeros++;
    });
    return{
      nome:name,
      media:cnt?soma/cnt:0,
      iniciados,zeros,total:cnt,alto,medio,baixo,
      pctIniciou:cnt?(iniciados/cnt*100):0,
      pctAlto:cnt?(alto/cnt*100):0,
      pctBaixo:cnt?(baixo/cnt*100):0
    };
  });
}

/* ===== RENDER ALL ===== */
function renderAll(filtered){
  const rows=filtered||ROWS;
  renderGeral(rows);
  renderTrilhas(rows);
  renderFinanceiro(rows);
  renderRenov(rows);
  renderPesquisa(rows);
  renderAlunosList(rows);
}

/* ===== VISAO GERAL ===== */
function renderGeral(rows){
  const total=rows.length;
  let vigentes=0,inativos=0,sem30=0,nunca=0;
  const consumos=[];
  rows.forEach(r=>{
    if(isAtivo(r)) vigentes++;
    else inativos++;
    if(nuncaAcessou(r)) nunca++;
    else if(semAcesso30(r)) sem30++;
    consumos.push(r.total||0);
  });
  const media=avg(consumos);
  const pctVigente=total?vigentes/total*100:0;
  const pctInativo=total?inativos/total*100:0;
  const pctSem30=total?sem30/total*100:0;
  const pctNunca=total?nunca/total*100:0;

  const kpis=`<div class="kpis">
    <div class="kpi"><div class="kpi-bar" style="background:linear-gradient(90deg,var(--accent),var(--a2))"></div><div class="kpi-l">Total de Alunos</div><div class="kpi-v">${fN(total)}</div><div class="kpi-s">emails unicos (dedup)</div></div>
    <div class="kpi"><div class="kpi-bar" style="background:linear-gradient(90deg,var(--teal),var(--green))"></div><div class="kpi-l">Media Consumo</div><div class="kpi-v">${fP(media)}</div><div class="kpi-s">base total: ${fN(consumos.length)} alunos</div></div>
    <div class="kpi"><div class="kpi-bar" style="background:linear-gradient(90deg,var(--green),var(--teal))"></div><div class="kpi-l">Ativos</div><div class="kpi-v">${fN(vigentes)}</div><div class="kpi-s">${fP(pctVigente)} da base · compra dentro de 1 ano</div></div>
    <div class="kpi"><div class="kpi-bar" style="background:linear-gradient(90deg,var(--orange),var(--red))"></div><div class="kpi-l">Sem acessar +30d</div><div class="kpi-v">${fN(sem30)}</div><div class="kpi-s">${fP(pctSem30)} da base</div></div>
    <div class="kpi"><div class="kpi-bar" style="background:linear-gradient(90deg,var(--red),var(--pink))"></div><div class="kpi-l">Nunca Acessaram</div><div class="kpi-v">${fN(nunca)}</div><div class="kpi-s">${fP(pctNunca)} da base</div></div>
  </div>`;

  const legend=`<div class="legend-box">
    <div class="lg-item"><span class="lg-dot" style="background:var(--green)"></span><strong>Ativo:</strong> comprou dentro do periodo de 1 ano (criadoEm + 365d > hoje)</div>
    <div class="lg-item"><span class="lg-dot" style="background:var(--red)"></span><strong>Inativo:</strong> comprou ha mais de 1 ano (acesso expirado)</div>
    <div class="lg-item"><span class="lg-dot" style="background:var(--orange)"></span><strong>Sem acessar +30d:</strong> ultimo acesso ha mais de 30 dias</div>
  </div>`;

  // Ranking by product
  const prodRank=PRODUCTS.map(p=>{
    const students=getProductStudents(p.key,rows);
    const uniqueEmails=new Set(students.map(s=>(s.email||'').toLowerCase().trim()));
    const consumoVals=[];
    students.forEach(s=>{
      if(typeof s.total==='number'){
        consumoVals.push(s.total);
      }else if(s.trilhas){
        const vals=Object.values(s.trilhas).filter(v=>typeof v==='number');
        consumoVals.push(vals.length?vals.reduce((a,b)=>a+b,0)/vals.length:0);
      }else{
        consumoVals.push(0);
      }
    });
    return{label:p.label,short:p.short,count:uniqueEmails.size,media:avg(consumoVals)};
  }).sort((a,b)=>b.count-a.count);

  const maxCount=Math.max(...prodRank.map(p=>p.count),1);
  const palette=['#8b7cf7','#a78bfa','#2dd4bf','#34d399','#38bdf8','#22d3ee','#fbbf24','#fb923c','#f472b6','#f87171'];

  const rank=`<div class="sec">Ranking por produto</div>

    <div class="hbar-area">

        const col=palette[i%palette.length];

          </div>
        </div>`;
      }).join('')}

  // Insights
  const bestProd=prodRank[0];
  const worstProd=[...prodRank].sort((a,b)=>a.media-b.media).filter(p=>p.count>0)[0];
  const insights=`<div class="sec">Insights</div>
    <div class="ins-g">

      ${worstProd?`<div class="ins w"><div class="ins-t">Menor media de consumo</div><div class="ins-p"><strong>${worstProd.label}</strong> com media de apenas ${fP(worstProd.media)}.</div></div>`:''}

      <div class="ins w"><div class="ins-t">Alunos inativos</div><div class="ins-p"><strong>${fN(inativos)}</strong> alunos (${fP(pctInativo)}) com compra ha mais de 1 ano.</div></div>

    </div>`;

  document.getElementById('cGeral').innerHTML=kpis+legend+rank+insights;
}

/* ===== FINANCEIRO (ASCENSAO) ===== */
function renderFinanceiro(rows){
  const cont=document.getElementById('cFinanceiro');
  if(!rows) rows=ROWS;

  // Build email sets per product
  const emailsByProd={};
  PRODUCTS.forEach(p=>{
    emailsByProd[p.key]=new Set((RAW[p.key]||[]).map(s=>(s.email||'').toLowerCase().trim()).filter(Boolean));
  });

  // Mentoria path: all products -> Mentoria (who from MTI/Decole/etc also has Mentoria)
  const mentoriaEmails=emailsByProd.mentoria;
  const nonMentoriaProds=PRODUCTS.filter(p=>p.key!=='mentoria');
  const mentoriaConversions={};
  nonMentoriaProds.forEach(p=>{
    const totalInProd=emailsByProd[p.key].size;
    let alsoMentoria=0;
    emailsByProd[p.key].forEach(em=>{if(mentoriaEmails.has(em))alsoMentoria++;});
    mentoriaConversions[p.key]={total:totalInProd,converted:alsoMentoria,pct:totalInProd?alsoMentoria/totalInProd*100:0,potential:totalInProd-alsoMentoria};
  });

  // MTI path: all other products -> MTI (excluding Mentoria)
  const mtiEmails=emailsByProd.mti;
  const nonMtiProds=PRODUCTS.filter(p=>p.key!=='mti'&&p.key!=='mentoria');
  const mtiConversions={};
  nonMtiProds.forEach(p=>{
    const totalInProd=emailsByProd[p.key].size;
    let alsoMti=0;
    emailsByProd[p.key].forEach(em=>{if(mtiEmails.has(em))alsoMti++;});
    mtiConversions[p.key]={total:totalInProd,converted:alsoMti,pct:totalInProd?alsoMti/totalInProd*100:0,potential:totalInProd-alsoMti};
  });

  // Total potential upsell to Mentoria
  const allNonMentoria=new Set();
  nonMentoriaProds.forEach(p=>{emailsByProd[p.key].forEach(em=>allNonMentoria.add(em));});
  let totalAlsoMentoria=0;
  allNonMentoria.forEach(em=>{if(mentoriaEmails.has(em))totalAlsoMentoria++;});
  const potentialMentoria=allNonMentoria.size-totalAlsoMentoria;
  const pctMentoria=allNonMentoria.size?totalAlsoMentoria/allNonMentoria.size*100:0;

  let h=`<div class="kpis" style="grid-template-columns:repeat(2,1fr)">
    <div class="kpi"><div class="kpi-bar" style="background:linear-gradient(90deg,var(--accent),var(--a2))"></div><div class="kpi-l">Cross-sell para Mentoria</div><div class="kpi-v">${fN(totalAlsoMentoria)}</div><div class="kpi-s">${fP(pctMentoria)} da base ja tem Mentoria</div></div>
    <div class="kpi"><div class="kpi-bar" style="background:linear-gradient(90deg,var(--orange),var(--gold))"></div><div class="kpi-l">Potencial Mentoria</div><div class="kpi-v">${fN(potentialMentoria)}</div><div class="kpi-s">Alunos que podem ascender</div></div>
    <div class="kpi"><div class="kpi-bar" style="background:linear-gradient(90deg,var(--teal),var(--green))"></div><div class="kpi-l">Alunos no Metodo</div><div class="kpi-v">${fN(mtiEmails.size)}</div><div class="kpi-s">Metodo Tia do Ingles (produto principal)</div></div>
    <div class="kpi"><div class="kpi-bar" style="background:linear-gradient(90deg,var(--sky),var(--cyan))"></div><div class="kpi-l">Alunos na Mentoria</div><div class="kpi-v">${fN(mentoriaEmails.size)}</div><div class="kpi-s">Mentoria Fluent Mind (upsell premium)</div></div>
  </div>`;

  // Calcular media de progresso dos que ascenderam
  function calcAvgProgress(fromProdKey, toProdKey){
    const fromStudents=RAW[fromProdKey]||[];
    const toEmails=emailsByProd[toProdKey];
    let soma=0,cnt=0;
    fromStudents.forEach(s=>{
      const em=(s.email||'').toLowerCase().trim();
      if(toEmails.has(em)){
        soma+=(typeof s.total==='number'?s.total:0);
        cnt++;
      }
    });
    return cnt?soma/cnt:0;
  }

  // Cross-sell cards: Mentoria path
  h+=`<div class="sec">Caminho de Ascensao - Mentoria Fluent Mind</div><div class="g2">`;
  nonMentoriaProds.forEach((p,i)=>{
    const c=mentoriaConversions[p.key];
    const avgProg=calcAvgProgress(p.key,'mentoria');
    const colors=['var(--accent)','var(--teal)','var(--sky)','var(--gold)'];
    const col=colors[i%colors.length];
    h+=`<div class="cross-card">
      <div class="cross-title" style="color:${col}">${p.label} → Mentoria</div>
      <div class="cross-desc">Alunos de ${p.short} que tambem possuem Mentoria Fluent Mind</div>
      <div class="cross-big" style="color:${col}">${fN(c.converted)} <span style="font-size:16px;color:var(--t2)">/ ${fN(c.total)}</span></div>
      <div class="cross-sub">${fP(c.pct)} de conversao · ${fN(c.potential)} potenciais</div>
      <div class="cross-bar"><div class="cross-bar-fill" style="width:${Math.min(c.pct,100)}%;background:${col}"></div></div>
      <div style="margin-top:12px;padding-top:12px;border-top:1px solid var(--border);display:flex;align-items:center;gap:8px">
        <span style="font-size:11px;color:var(--t3)">Media progresso no ${p.short}:</span>
        <span style="font-family:JetBrains Mono;font-weight:700;color:${col}">${fP(avgProg)}</span>
      </div>
    </div>`;
  });
  h+=`</div>`;

  // Cross-sell cards: Metodo Tia do Ingles path
  h+=`<div class="sec">Caminho de Ascensao - Metodo Tia do Ingles</div><div class="g2">`;
  nonMtiProds.forEach((p,i)=>{
    const c=mtiConversions[p.key];
    const avgProg2=calcAvgProgress(p.key,'mti');
    const colors=['var(--green)','var(--cyan)','var(--pink)'];
    const col=colors[i%colors.length];
    h+=`<div class="cross-card">
      <div class="cross-title" style="color:${col}">${p.label} → Metodo Tia do Ingles</div>
      <div class="cross-desc">Alunos de ${p.short} que tambem possuem Metodo Tia do Ingles</div>
      <div class="cross-big" style="color:${col}">${fN(c.converted)} <span style="font-size:16px;color:var(--t2)">/ ${fN(c.total)}</span></div>
      <div class="cross-sub">${fP(c.pct)} de conversao · ${fN(c.potential)} potenciais</div>
      <div class="cross-bar"><div class="cross-bar-fill" style="width:${Math.min(c.pct,100)}%;background:${col}"></div></div>
      <div style="margin-top:12px;padding-top:12px;border-top:1px solid var(--border);display:flex;align-items:center;gap:8px">
        <span style="font-size:11px;color:var(--t3)">Media progresso no ${p.short}:</span>
        <span style="font-family:JetBrains Mono;font-weight:700;color:${col}">${fP(avgProg2)}</span>
      </div>
    </div>`;
  });
  h+=`</div>`;

  // Potential upsell list (non-mentoria students)
  const potList=[];
  allNonMentoria.forEach(em=>{
    if(!mentoriaEmails.has(em)){
      const row=ROWS.find(r=>r.email===em);

    }
  });
  potList.sort((a,b)=>(b.total||0)-(a.total||0));

  if(potList.length>0){
    const finPer=50,finPages=Math.max(1,Math.ceil(potList.length/finPer));
    if(!window._FIN_PAGE||window._FIN_PAGE>finPages) window._FIN_PAGE=1;
    const finSlice=potList.slice((window._FIN_PAGE-1)*finPer,window._FIN_PAGE*finPer);
    h+=`<div class="sec">Potencial Upsell Mentoria (${fN(potList.length)} alunos)</div>
    <div class="card"><div style="overflow-x:auto;scrollbar-width:none;-ms-overflow-style:none"><table class="det-table">
      <thead><tr><th>Aluno</th><th>Email</th><th>Produtos</th><th style="text-align:right">Media</th></tr></thead>
      <tbody>${finSlice.map(r=>`<tr>
        <td style="color:var(--t1);font-weight:600">${r.nome||'-'}</td>
        <td style="font-size:12px">${r.email||'-'}</td>
        <td style="font-size:12px">${r.produtoLabels.join(', ')}</td>
        <td style="text-align:right;font-family:JetBrains Mono;font-weight:700;color:var(--accent)">${fP(r.total||0)}</td>
      </tr>`).join('')}</tbody>
    </table></div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-top:12px">
      <span style="font-family:JetBrains Mono;font-size:12px;color:var(--t3)">Pagina ${window._FIN_PAGE}/${finPages} - ${fN(potList.length)} alunos</span>
      <div class="det-pager">${Array.from({length:finPages},(_,i)=>i+1).filter(p=>p===1||p===finPages||Math.abs(p-window._FIN_PAGE)<=2).map(p=>`<button class="${p===window._FIN_PAGE?'active':''}" onclick="finGo(${p})">${p}</button>`).join('')}</div>
    </div></div>`;
  }

  // Insights
  h+=`<div class="sec">Insights — Financeiro</div><div class="ins-g">`;
  if(potentialMentoria>0) h+=`<div class="ins i"><div class="ins-t">Oportunidade de upsell Mentoria</div><div class="ins-p"><strong>${fN(potentialMentoria)}</strong> alunos de outros produtos ainda nao possuem Mentoria Fluent Mind.</div></div>`;
  const bestConv=Object.entries(mentoriaConversions).sort((a,b)=>b[1].pct-a[1].pct)[0];
  if(bestConv){
    const prod=PRODUCTS.find(p=>p.key===bestConv[0]);
    h+=`<div class="ins ok"><div class="ins-t">Melhor taxa de conversao</div><div class="ins-p"><strong>${prod.label}</strong> tem ${fP(bestConv[1].pct)} de alunos que tambem possuem Mentoria.</div></div>`;
  }
  h+=`<div class="ins ok"><div class="ins-t">Mentoria Fluent Mind</div><div class="ins-p"><strong>${fN(mentoriaEmails.size)}</strong> alunos no produto premium.</div></div>`;
  h+=`</div>`;

  cont.innerHTML=h;
}
function finGo(p){window._FIN_PAGE=p;renderFinanceiro(getFiltered().length?getFiltered():ROWS);}

/* ===== RENOVACAO ===== */
let RN_PAGE=1,RN_SORT='dias',RN_DIR=1;

function renderRenov(rows){
  const cont=document.getElementById('cRenov');
  const hoje=new Date(NOW);hoje.setHours(0,0,0,0);const hojeMs=hoje.getTime();

  // Compute expiration for each row
  const withVenc=rows.map(r=>{
    const exp=getExpiration(r);
    if(!exp) return{r,dias:null,venc:null};
    const dias=Math.floor((exp-hojeMs)/DAY);
    return{r,dias,venc:exp};
  });

  const ativosCount=withVenc.filter(x=>x.dias!==null&&x.dias>0).length+withVenc.filter(x=>x.dias===null).length;
  const vencidos=withVenc.filter(x=>x.dias!==null&&x.dias<0);
  const vencem30=withVenc.filter(x=>x.dias!==null&&x.dias>=0&&x.dias<=30);
  const vencem60=withVenc.filter(x=>x.dias!==null&&x.dias>30&&x.dias<=60);
  const vencem90=withVenc.filter(x=>x.dias!==null&&x.dias>60&&x.dias<=90);
  const vencem120=withVenc.filter(x=>x.dias!==null&&x.dias>90&&x.dias<=120);

  let h=`<div class="kpis">
    <div class="kpi"><div class="kpi-bar" style="background:linear-gradient(90deg,var(--accent),var(--a2))"></div><div class="kpi-l">Alunos Ativos</div><div class="kpi-v">${fN(ativosCount)}</div><div class="kpi-s">${fP(rows.length?ativosCount/rows.length*100:0)} da base · compra dentro de 1 ano</div></div>
    <div class="kpi"><div class="kpi-bar" style="background:linear-gradient(90deg,var(--red),var(--pink))"></div><div class="kpi-l">Alunos Inativos</div><div class="kpi-v">${fN(vencidos.length)}</div><div class="kpi-s">Compra ha mais de 1 ano</div></div>
    <div class="kpi"><div class="kpi-bar" style="background:linear-gradient(90deg,var(--orange),var(--gold))"></div><div class="kpi-l">Vencem em 30d</div><div class="kpi-v">${fN(vencem30.length)}</div><div class="kpi-s">Acao urgente</div></div>
    <div class="kpi"><div class="kpi-bar" style="background:linear-gradient(90deg,var(--gold),var(--sky))"></div><div class="kpi-l">Vencem 31-60d</div><div class="kpi-v">${fN(vencem60.length)}</div><div class="kpi-s">Planejar abordagem</div></div>
    <div class="kpi"><div class="kpi-bar" style="background:linear-gradient(90deg,var(--sky),var(--cyan))"></div><div class="kpi-l">Vencem 61-90d</div><div class="kpi-v">${fN(vencem90.length)}</div><div class="kpi-s">Aquecer contato</div></div>
  </div>
  <div class="kpis" style="margin-top:12px;grid-template-columns:repeat(2,1fr)">
    <div class="kpi"><div class="kpi-bar" style="background:linear-gradient(90deg,var(--cyan),var(--teal))"></div><div class="kpi-l">Vencem 91-120d</div><div class="kpi-v">${fN(vencem120.length)}</div><div class="kpi-s">Monitorar</div></div>
    <div class="kpi"><div class="kpi-bar" style="background:linear-gradient(90deg,var(--green),var(--teal))"></div><div class="kpi-l">Total Base</div><div class="kpi-v">${fN(rows.length)}</div><div class="kpi-s">Todos os alunos filtrados</div></div>
  </div>`;

  // Expiration by product chart
  const prodVenc=PRODUCTS.map(p=>{
    const students=getProductStudents(p.key,rows);
    let atv=0,venc=0;
    students.forEach(s=>{
      if(!s.criadoEm){atv++;return;}
      const exp=s.criadoEm+365*DAY;
      if(exp>NOW) atv++;else venc++;
    });
    return{label:p.short,total:students.length,atv,venc,pct:students.length?atv/students.length*100:0};
  }).filter(p=>p.total>0);

  if(prodVenc.length>0){
    const maxPct=Math.max(...prodVenc.map(p=>p.pct),1);
    const colPal=['#8b7cf7','#34d399','#38bdf8','#fb923c','#f472b6'];
    h+=`<div class="sec">Ativos por Produto</div>
    <div class="card"><h3>Percentual de ativos por produto</h3><div class="d">Alunos que compraram dentro do periodo de 1 ano</div>
    <div class="hbar-area">
      ${prodVenc.map((p,i)=>{
        const w=Math.max(p.pct/maxPct*100,1);
        const col=colPal[i%colPal.length];
        return `<div class="hbar-row">
          <div class="hbar-lbl">${p.label}</div>
          <div class="hbar-track"><div class="hbar-fill" style="width:${w}%;background:${col}">${p.pct>=3?p.pct.toFixed(1)+'%':''}</div></div>
          <div style="display:flex;flex-direction:column;align-items:flex-end;min-width:120px;margin-left:8px">
            <div style="font-family:JetBrains Mono;font-size:14px;font-weight:700;color:${col}">${p.pct.toFixed(1)}%</div>
            <div style="font-family:JetBrains Mono;font-size:11px;color:var(--t3)">${fN(p.atv)} / ${fN(p.total)}</div>
          </div>
        </div>`;
      }).join('')}
    </div></div>`;
  }

  // Student table with countdown
  const tableRows=[...withVenc].filter(x=>x.dias!==null).sort((a,b)=>{
    if(RN_SORT==='nome') return RN_DIR*(a.r.nome||'').localeCompare(b.r.nome||'');
    if(RN_SORT==='produto') return RN_DIR*(a.r.produtoLabels[0]||'').localeCompare(b.r.produtoLabels[0]||'');
    if(RN_SORT==='fim') return RN_DIR*((a.venc||0)-(b.venc||0));
    return RN_DIR*(a.dias-b.dias);
  });
  const per=50,pages=Math.max(1,Math.ceil(tableRows.length/per));
  if(RN_PAGE>pages)RN_PAGE=1;
  const slice=tableRows.slice((RN_PAGE-1)*per,RN_PAGE*per);

  h+=`<div class="sec">Alunos - ${fN(tableRows.length)} registros</div>
  <div class="card"><div style="overflow-x:auto;scrollbar-width:none;-ms-overflow-style:none"><table class="det-table">
    <thead><tr>
      <th style="cursor:pointer" onclick="rnSort('nome')">Aluno</th>
      <th style="cursor:pointer" onclick="rnSort('produto')">Produtos</th>
      <th style="text-align:right;cursor:pointer" onclick="rnSort('fim')">Fim Acesso</th>
      <th style="text-align:right;cursor:pointer" onclick="rnSort('dias')">Dias restantes</th>
      <th>Status</th>
    </tr></thead>
    <tbody>${slice.map(x=>{
      const r=x.r;
      const venc=x.dias<0;
      const st=venc?'Inativo':(x.dias<=30?'Urgente':(x.dias<=60?'Atentar':(x.dias<=90?'Planejar':'Ativo')));
      const col=venc?'var(--red)':(x.dias<=30?'var(--orange)':(x.dias<=60?'var(--gold)':(x.dias<=90?'var(--sky)':'var(--teal)')));
      const bg=venc?'rgba(248,113,113,.12)':(x.dias<=30?'rgba(251,146,60,.12)':(x.dias<=60?'rgba(251,191,36,.12)':(x.dias<=90?'rgba(56,189,248,.12)':'rgba(45,212,191,.12)')));
      return `<tr>
        <td><div style="color:var(--t1);font-weight:600">${r.nome||'-'}</div><div style="font-size:11px;color:var(--t3)">${r.email||''}</div></td>
        <td style="font-size:12px">${r.produtoLabels.join(', ')}</td>
        <td style="text-align:right;font-family:JetBrains Mono;font-size:12px">${fmt(x.venc)}</td>
        <td style="text-align:right;font-family:JetBrains Mono;font-weight:700;color:${col}">${venc?('-'+Math.abs(x.dias)+'d'):(x.dias+'d')}</td>
        <td><span style="padding:3px 10px;border-radius:8px;font-size:11px;font-weight:600;background:${bg};color:${col}">${st}</span></td>
      </tr>`;
    }).join('')}</tbody>
  </table></div>
  <div class="det-pager">${Array.from({length:pages},(_,i)=>i+1).filter(p=>p===1||p===pages||Math.abs(p-RN_PAGE)<=2).map(p=>`<button class="${p===RN_PAGE?'active':''}" onclick="rnGo(${p})">${p}</button>`).join('')}</div>
  </div>`;

  // Insights
  h+=`<div class="sec">Insights de Renovacao</div><div class="ins-g">`;
  if(vencidos.length>0) h+=`<div class="ins w"><div class="ins-t">${fN(vencidos.length)} acessos vencidos</div><div class="ins-p">Alunos com acesso expirado. Iniciar fluxo de reativacao ou renovacao.</div></div>`;
  else h+=`<div class="ins ok"><div class="ins-t">Todos ativos</div><div class="ins-p">Todos os alunos compraram dentro do periodo de 1 ano.</div></div>`;
  if(vencem30.length>0) h+=`<div class="ins w"><div class="ins-t">${fN(vencem30.length)} vencem nos proximos 30 dias</div><div class="ins-p">Acao urgente - iniciar campanha de renovacao agora.</div></div>`;
  if(vencem60.length>0) h+=`<div class="ins i"><div class="ins-t">${fN(vencem60.length)} vencem em 31-60 dias</div><div class="ins-p">Planejar abordagem para esses alunos.</div></div>`;
  h+=`</div>`;

  cont.innerHTML=h;
}
function rnGo(p){RN_PAGE=p;renderRenov(getFiltered().length?getFiltered():ROWS);}
function rnSort(col){if(RN_SORT===col)RN_DIR*=-1;else{RN_SORT=col;RN_DIR=col==='dias'?1:-1;}RN_PAGE=1;renderRenov(getFiltered().length?getFiltered():ROWS);}

/* ===== PESQUISA ===== */
function pesqDonut(data,colors,size){
  var total=0;data.forEach(function(d){total+=d[1];});
  if(!total) return '<div style="color:var(--t3);text-align:center;padding:20px">Sem dados</div>';
  var segs=[],cum=0;
  for(var i=0;i<data.length;i++){
    var pct=data[i][1]/total*100;
    segs.push(colors[i%colors.length]+' '+cum.toFixed(1)+'% '+(cum+pct).toFixed(1)+'%');
    cum+=pct;
  }
  var sz=size||160;
  var h='<div style="display:flex;align-items:center;gap:20px;flex-wrap:wrap;justify-content:center">';
  h+='<div style="width:'+sz+'px;height:'+sz+'px;border-radius:50%;background:conic-gradient('+segs.join(',')+');display:flex;align-items:center;justify-content:center">';
  h+='<div style="width:'+(sz*0.6)+'px;height:'+(sz*0.6)+'px;border-radius:50%;background:var(--card);display:flex;align-items:center;justify-content:center;font-family:JetBrains Mono;font-size:20px;font-weight:700">'+fN(total)+'</div></div>';
  h+='<div style="display:flex;flex-direction:column;gap:6px">';
  for(var j=0;j<data.length;j++){
    var p2=(data[j][1]/total*100).toFixed(1);
    var dtip='<div class=tt-title>'+data[j][0].replace(/'/g,'')+'</div><div class=tt-row><span class=tt-label>Quantidade:</span><span class=tt-value>'+fN(data[j][1])+'</span></div><div class=tt-row><span class=tt-label>Percentual:</span><span class=tt-value>'+p2+'%</span></div>';
    h+='<div style="display:flex;align-items:center;gap:8px;font-size:13px;cursor:default" onmouseenter="showTip(event,this.dataset.tip)" onmousemove="showTip(event,this.dataset.tip)" onmouseleave="hideTip()" data-tip="'+dtip.replace(/"/g,'&quot;')+'"><div style="width:12px;height:12px;border-radius:3px;background:'+colors[j%colors.length]+'"></div>'+data[j][0]+' <span style="color:var(--t3);font-family:JetBrains Mono">'+fN(data[j][1])+' ('+p2+'%)</span></div>';
  }
  h+='</div></div>';
  return h;
}

function pesqHBars(data,color){
  if(!data.length) return '<div style="color:var(--t3);text-align:center;padding:20px">Sem dados</div>';
  var max=data[0][1];
  var total2=0;data.forEach(function(x){total2+=x[1];});
  var h='<div class="hbar-area">';
  for(var i=0;i<data.length;i++){
    var w=max?data[i][1]/max*100:0;
    var lbl=data[i][0].length>25?data[i][0].substring(0,23)+'...':data[i][0];
    var pct2=total2?(data[i][1]/total2*100).toFixed(1):'0';
    var btip='<div class=tt-title>'+data[i][0].replace(/'/g,'')+'</div><div class=tt-row><span class=tt-label>Quantidade:</span><span class=tt-value>'+data[i][1]+'</span></div><div class=tt-row><span class=tt-label>Percentual:</span><span class=tt-value>'+pct2+'%</span></div>';
    h+='<div class="hbar-row" style="cursor:default" onmouseenter="showTip(event,this.dataset.tip)" onmousemove="showTip(event,this.dataset.tip)" onmouseleave="hideTip()" data-tip="'+btip.replace(/"/g,'&quot;')+'">';
    h+='<div class="hbar-lbl" title="'+data[i][0]+'">'+lbl+'</div>';
    h+='<div class="hbar-track"><div class="hbar-fill" style="width:'+w.toFixed(1)+'%;background:'+(color||'var(--accent)')+'">'+data[i][1]+'</div></div>';
    h+='<div style="font-family:JetBrains Mono;font-size:12px;color:var(--t2);min-width:50px;text-align:right;margin-left:8px">'+pct2+'%</div>';
    h+='</div>';
  }
  h+='</div>';
  return h;
}

function renderPesquisa(rows){
  var cont=document.getElementById('cPesquisa');
  if(!cont) return;

  var data=PESQ;
  if(!data||!data.length){cont.innerHTML='<div style="color:var(--t3);text-align:center;padding:60px 20px;font-size:16px">Nenhuma resposta de pesquisa encontrada.</div>';return;}

  var total=data.length;

  function countField(field, includeEmpty){
    var map={};
    data.forEach(function(d){
      var v=d[field];
      if(!v && !includeEmpty) return;
      var key=v||'Nao informado';
      map[key]=(map[key]||0)+1;
    });
    return Object.entries(map).sort(function(a,b){return b[1]-a[1];});
  }

  var COLORS=['var(--accent)','var(--a2)','var(--teal)','var(--green)','var(--orange)','var(--gold)','var(--sky)','var(--cyan)','var(--pink)','var(--red)'];

  var h='';

  // KPIs
  var feminino=0,masculino=0;
  data.forEach(function(d){
    var s=(d.sexo||'').toLowerCase();
    if(s.indexOf('femin')!==-1||s==='f') feminino++;
    else if(s.indexOf('masc')!==-1||s==='m') masculino++;
  });
  var pctFem=total?feminino/total*100:0;

  var basico=0;
  data.forEach(function(d){
    var n=(d.nivelIngles||'').toLowerCase();
    if(n.indexOf('basico')!==-1||n.indexOf('básico')!==-1||n.indexOf('iniciante')!==-1||n.indexOf('beginner')!==-1) basico++;
  });
  var pctBasico=total?basico/total*100:0;

  h+='<div class="kpis">';
  h+='<div class="kpi"><div class="kpi-bar" style="background:linear-gradient(90deg,var(--accent),var(--a2))"></div><div class="kpi-l">Total de Respostas</div><div class="kpi-v">'+fN(total)+'</div><div class="kpi-s">pesquisa completa</div></div>';
  h+='<div class="kpi"><div class="kpi-bar" style="background:linear-gradient(90deg,var(--pink),var(--red))"></div><div class="kpi-l">% Feminino</div><div class="kpi-v">'+fP(pctFem)+'</div><div class="kpi-s">'+fN(feminino)+' de '+fN(total)+'</div></div>';
  h+='<div class="kpi"><div class="kpi-bar" style="background:linear-gradient(90deg,var(--orange),var(--gold))"></div><div class="kpi-l">% Nivel Basico</div><div class="kpi-v">'+fP(pctBasico)+'</div><div class="kpi-s">'+fN(basico)+' iniciantes</div></div>';

  var conhecePNL=0;
  data.forEach(function(d){
    var v=(d.conheciaPNL||'').toLowerCase();
    if(v && v.indexOf('nunca')===-1 && v.indexOf('não')===-1 && v.indexOf('nao')===-1) conhecePNL++;
  });
  h+='<div class="kpi"><div class="kpi-bar" style="background:linear-gradient(90deg,var(--teal),var(--green))"></div><div class="kpi-l">Ja Ouviu Falar de PNL</div><div class="kpi-v">'+fP(total?conhecePNL/total*100:0)+'</div><div class="kpi-s">'+fN(conhecePNL)+' de '+fN(total)+' ja tinham contato</div></div>';

  var tempoSet={};
  data.forEach(function(d){if(d.tempoConheceTia){tempoSet[d.tempoConheceTia]=(tempoSet[d.tempoConheceTia]||0)+1;}});
  var tempoArr=Object.entries(tempoSet).sort(function(a,b){return b[1]-a[1];});
  var topTempo=tempoArr[0];
  h+='<div class="kpi"><div class="kpi-bar" style="background:linear-gradient(90deg,var(--sky),var(--cyan))"></div><div class="kpi-l">Tempo Conhece Tia</div><div class="kpi-v">'+(topTempo?topTempo[0]:'--')+'</div><div class="kpi-s">resposta mais frequente</div></div>';
  h+='</div>';

  // Perfil
  h+='<div class="sec">Perfil do Aluno</div>';
  var sexoData=countField('sexo',true);
  var idadeData=countField('idade');
  var nivelData=countField('nivelIngles');
  var rendaData=countField('faixaRenda');
  var trabalhoData=countField('formaTrabalho');

  h+='<div class="g2">';
  h+='<div class="card"><h3>Sexo</h3><div class="d">Distribuicao por genero</div>'+pesqDonut(sexoData,['var(--pink)','var(--sky)','var(--accent)','var(--teal)'],160)+'</div>';
  h+='<div class="card"><h3>Faixa Etaria</h3><div class="d">Distribuicao por idade</div>'+pesqHBars(idadeData,'var(--accent)')+'</div>';
  h+='</div>';
  h+='<div class="g2">';
  h+='<div class="card"><h3>Nivel de Ingles</h3><div class="d">Autoavaliacao do nivel</div>'+pesqHBars(nivelData,'var(--teal)')+'</div>';
  h+='<div class="card"><h3>Faixa de Renda</h3><div class="d">Distribuicao por renda</div>'+pesqHBars(rendaData,'var(--green)')+'</div>';
  h+='</div>';
  h+='<div class="g2">';
  h+='<div class="card"><h3>Forma de Trabalho</h3><div class="d">Como trabalham</div>'+pesqHBars(trabalhoData,'var(--orange)')+'</div>';

/* ===== ALUNOS ===== */
let AL_PAGE=1,AL_SORT='total',AL_DIR=-1,AL_SEARCH='',AL_ROWS=[];

function renderAlunosList(rows){
  AL_ROWS=rows;AL_PAGE=1;
  mountAlunos();
  drawAlunos();
}

function mountAlunos(){
  const c=document.getElementById('cAlunos');
  if(c.dataset.mounted==='1') return;
  c.dataset.mounted='1';
  c.innerHTML=`
    <div class="sec">Alunos</div>
    <div class="card">
      <div style="display:flex;gap:12px;align-items:center;flex-wrap:wrap;margin-bottom:16px">
        <input class="det-search" id="alSearchInput" placeholder="Buscar por nome, email ou produto..." oninput="alSearch(this.value)">
        <span id="alResultsInfo" style="font-family:JetBrains Mono;color:var(--t3);font-size:12px"></span>
      </div>
      <div style="overflow-x:auto"><table class="det-table" id="alTable"></table></div>
      <div id="alPager" class="det-pager"></div>
    </div>`;
  document.getElementById('alSearchInput').value=AL_SEARCH;
}

function drawAlunos(){
  if(!document.getElementById('alTable'))return;
  const q=norm(AL_SEARCH);
  let list=AL_ROWS.filter(r=>{
    if(!q)return true;
    return norm(r.nome).includes(q)||norm(r.email).includes(q)||norm(r.produtoLabels.join(' ')).includes(q);
  });
  list.sort((a,b)=>{
    let av,bv;
    if(AL_SORT==='nome'){av=norm(a.nome);bv=norm(b.nome);return av<bv?-AL_DIR:av>bv?AL_DIR:0;}
    if(AL_SORT==='compra'){av=a.criadoEm||0;bv=b.criadoEm||0;}
    else if(AL_SORT==='ult'){av=a.ultAcesso||0;bv=b.ultAcesso||0;}
    else{av=a.total||0;bv=b.total||0;}
    return(av-bv)*AL_DIR;
  });
  const per=50,pages=Math.max(1,Math.ceil(list.length/per));
  if(AL_PAGE>pages)AL_PAGE=pages;
  const slice=list.slice((AL_PAGE-1)*per,AL_PAGE*per);
  const stBadge=r=>{const c=statusClass(r);const l=statusLabel(r);return`<span class="det-status ${c}">${l}</span>`;};
  const head=`<thead><tr>
    <th onclick="alSort('nome')">Aluno ${AL_SORT==='nome'?(AL_DIR>0?'&#9650;':'&#9660;'):''}</th>
    <th>Produtos</th>
    <th>Status</th>
    <th onclick="alSort('compra')">Data Compra ${AL_SORT==='compra'?(AL_DIR>0?'&#9650;':'&#9660;'):''}</th>
    <th onclick="alSort('ult')">Ultimo acesso ${AL_SORT==='ult'?(AL_DIR>0?'&#9650;':'&#9660;'):''}</th>
    <th onclick="alSort('total')" style="text-align:right">Media ${AL_SORT==='total'?(AL_DIR>0?'&#9650;':'&#9660;'):''}</th>
  </tr></thead>`;
  const body=`<tbody>${slice.map(r=>{
    const t=r.total||0;
    const color=t>=50?'var(--green)':t>=20?'var(--gold)':t>0?'var(--orange)':'var(--red)';
    return`<tr>
      <td><div style="color:var(--t1);font-weight:600">${r.nome||'-'}</div><div style="font-size:11px;color:var(--t3)">${r.email||''}</div></td>
      <td style="font-size:12px">${r.produtoLabels.join(', ')}</td>
      <td>${stBadge(r)}</td>
      <td style="font-family:JetBrains Mono;font-size:12px">${fmt(r.criadoEm)}</td>
      <td style="font-family:JetBrains Mono;font-size:12px">${fmt(r.ultAcesso)}</td>
      <td style="text-align:right"><div class="det-prog"><div class="det-prog-bar"><div class="det-prog-fill" style="width:${Math.min(t,100)}%;background:${color}"></div></div><span style="font-family:JetBrains Mono;font-weight:700;color:${color};min-width:50px;text-align:right">${fP(t)}</span></div></td>
    </tr>`;
  }).join('')}</tbody>`;
  document.getElementById('alTable').innerHTML=head+body;
  document.getElementById('alResultsInfo').textContent=fN(list.length)+' resultado(s) - pagina '+AL_PAGE+'/'+pages;
  document.getElementById('alPager').innerHTML=Array.from({length:pages},(_,i)=>i+1).filter(p=>p===1||p===pages||Math.abs(p-AL_PAGE)<=2).map(p=>`<button class="${p===AL_PAGE?'active':''}" onclick="alGo(${p})">${p}</button>`).join('');
}
function alSort(f){if(AL_SORT===f)AL_DIR*=-1;else{AL_SORT=f;AL_DIR=f==='nome'?1:-1;}drawAlunos();}
function alGo(p){AL_PAGE=p;drawAlunos();}
function alSearch(v){AL_SEARCH=v;AL_PAGE=1;drawAlunos();}

</script>
